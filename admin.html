<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        body { background: #0f172a; color: white; padding: 40px; font-family: sans-serif; }
        .container { max-width: 600px; background: #1e293b; padding: 30px; border-radius: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #0f172a; color: white; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
<div class="container">
    <h2>Song Management Center</h2>
    <input id="title" placeholder="Song Title">
    <input id="artist" placeholder="Artist Name">
    <input id="id" placeholder="YouTube Video ID">
    <button onclick="addSong()" style="background: #38bdf8;">Save Song Track</button>
    <button onclick="publish()" style="background: #10b981;">Publish Library</button>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyDDxrxQrl5RxCx902t3tfbxoenxVQ-di9I", authDomain: "euberus-sg.firebaseapp.com", databaseURL: "https://euberus-sg-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "euberus-sg", storageBucket: "euberus-sg.firebasestorage.app", messagingSenderId: "320119039235", appId: "1:320119039235:web:875717ac32d9a282507536" };
    firebase.initializeApp(firebaseConfig);

    function addSong() {
        const title = document.getElementById('title').value;
        const artist = document.getElementById('artist').value;
        const driveFileId = document.getElementById('id').value;
        firebase.database().ref('songs').push({title, artist, driveFileId});
        alert("Added!");
    }

    function publish() {
        // This triggers a real-time update event
        firebase.database().ref('metadata').set({ lastPublished: Date.now() });
        alert("Library Published! All devices have been updated.");
    }
</script>
</body>
</html>
