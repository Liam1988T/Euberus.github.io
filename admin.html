<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euberus Stream - Code Generator Admin</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-color: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --danger-color: #ef4444;
            --success-color: #10b981;
            --modify-color: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 40px 20px; display: flex; justify-content: center; }
        
        .admin-layout { display: grid; grid-template-columns: 1fr; gap: 20px; width: 100%; max-width: 1100px; }
        @media (min-width: 850px) { .admin-layout { grid-template-columns: 1.6fr 1fr; } }

        .admin-container { background-color: var(--panel-color); border-radius: 12px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); display: flex; flex-direction: column; gap: 20px; }
        .sidebar-container { background-color: var(--panel-color); border-radius: 12px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); border: 1px dashed var(--border-color); align-self: start; }
        
        h1 { font-size: 22px; color: var(--accent-color); border-bottom: 2px solid var(--border-color); padding-bottom: 10px; margin-bottom: 5px; }
        h2 { font-size: 15px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 10px; }
        
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 13px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        input, textarea { background-color: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px; border-radius: 6px; font-size: 14px; width: 100%; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent-color); }
        
        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        button { cursor: pointer; padding: 10px 20px; border: none; border-radius: 6px; font-weight: 600; font-size: 14px; transition: background 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        
        .btn-primary { background-color: var(--accent-color); color: #0f172a; }
        .btn-primary:hover { background-color: #7dd3fc; }
        .btn-secondary { background-color: #334155; color: var(--text-main); }
        .btn-secondary:hover { background-color: #475569; }
        .btn-action { padding: 6px 12px; font-size: 13px; color: white; border-radius: 4px; }
        
        .track-list { list-style: none; margin-top: 5px; display: flex; flex-direction: column; gap: 10px; }
        .track-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid rgba(255,255,255,0.02); }
        .track-meta { color: var(--accent-color); font-size: 13px; font-family: monospace; margin-top: 4px; }
        .actions-wrapper { display: flex; gap: 8px; }
    </style>
</head>
<body>

<div class="admin-layout">
    
    <div class="admin-container">
        <h1 id="panel-title">Euberus Control Dashboard</h1>
        
        <form id="track-form" onsubmit="handleFormSubmit(event)">
            <input type="hidden" id="edit-index" value="-1">
            <div class="form-group">
                <label>Song Title</label>
                <input type="text" id="title" required placeholder="e.g., Because You're My Woman">
            </div>
            <div class="form-group">
                <label>Artist Name</label>
                <input type="text" id="artist" required placeholder="e.g., Lee Seung Gi">
            </div>
            <div class="form-group">
                <label>YouTube Video ID</label>
                <input type="text" id="driveFileId" required placeholder="e.g., e8zl1u2plOQ">
            </div>
            <div class="btn-row">
                <button type="submit" class="btn-primary" id="submit-btn">➕ Add Track</button>
                <button type="button" class="btn-secondary" id="cancel-btn" style="display:none;" onclick="resetFormState()">Cancel Edit</button>
            </div>
        </form>

        <h2>📦 Track Inventory Configuration</h2>
        <ul class="track-list" id="admin-playlist"></ul>
    </div>

    <div class="sidebar-container">
        <h1 style="font-size: 16px;">💾 GitHub Code Generator</h1>
        <p style="font-size: 12px; color: var(--text-muted); margin: 10px 0 15px 0; line-height: 1.5;">
            Manage your songs on the left, click copy block below, and replace the database array inside your files on GitHub!
        </p>
        <div class="form-group">
            <textarea id="sync-string" rows="12" readonly style="font-family: monospace; font-size: 11px; color: #38bdf8;"></textarea>
        </div>
        <div class="btn-row" style="flex-direction: column;">
            <button type="button" class="btn-primary" style="width: 100%; justify-content: center; background-color: var(--success-color); color: white;" onclick="copyCodeBlock()">📋 Copy Code Array</button>
        </div>
    </div>

</div>

<script>
    const STORAGE_KEY = 'euberus_song_git_db';

    // Seed data matching index.html
    const defaultMockData = [
        { id: "track_1", title: "Because You're My Woman", artist: "Lee Seung Gi", driveFileId: "e8zl1u2plOQ" },
        { id: "track_2", title: "Yin Wei Ai Suo Yi Ai", artist: "Nicholas Tse", driveFileId: "BF2JQYwV9_8" }
    ];

    function getLibrary() {
        const data = localStorage.getItem(STORAGE_KEY);
        if (!data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultMockData));
            return defaultMockData;
        }
        return JSON.parse(data);
    }

    function generateCodeOutput() {
        const songs = getLibrary();
        const outputBox = document.getElementById('sync-string');
        outputBox.value = JSON.stringify(songs, null, 4);
    }

    function renderAdminList() {
        const songs = getLibrary();
        const container = document.getElementById('admin-playlist');
        container.innerHTML = '';
        
        if(songs.length === 0) {
            container.innerHTML = `<li style="color: var(--text-muted); font-size: 14px; font-style: italic; padding: 10px;">No tracks loaded.</li>`;
            return;
        }

        songs.forEach((song, index) => {
            const li = document.createElement('li');
            li.className = 'track-item';
            li.innerHTML = `
                <div>
                    <strong style="font-size: 15px;">${song.title}</strong> 
                    <span style="color: var(--text-muted); font-size: 14px;">- ${song.artist}</span>
                    <div class="track-meta">${song.driveFileId}</div>
                </div>
                <div class="actions-wrapper">
                    <button type="button" class="btn-action" style="background-color: var(--modify-color);" onclick="startModify(${index})">Modify</button>
                    <button type="button" class="btn-action" style="background-color: var(--danger-color);" onclick="deleteSong(${index})">Delete</button>
                </div>
            `;
            container.appendChild(li);
        });
        generateCodeOutput();
    }

    function handleFormSubmit(e) {
        e.preventDefault();
        const songs = getLibrary();
        const editIndex = parseInt(document.getElementById('edit-index').value);
        
        const titleVal = document.getElementById('title').value;
        const artistVal = document.getElementById('artist').value;
        const idVal = document.getElementById('driveFileId').value;

        if (editIndex > -1) {
            songs[editIndex].title = titleVal;
            songs[editIndex].artist = artistVal;
            songs[editIndex].driveFileId = idVal;
        } else {
            const newSong = {
                id: "track_" + Date.now(),
                title: titleVal,
                artist: artistVal,
                driveFileId: idVal
            };
            songs.push(newSong);
        }
        
        localStorage.setItem(STORAGE_KEY, JSON.stringify(songs));
        resetFormState();
        renderAdminList();
    }

    function startModify(index) {
        const songs = getLibrary();
        const song = songs[index];
        
        document.getElementById('edit-index').value = index;
        document.getElementById('title').value = song.title;
        document.getElementById('artist').value = song.artist;
        document.getElementById('driveFileId').value = song.driveFileId;
        
        document.getElementById('submit-btn').textContent = "💾 Save Modifications";
        document.getElementById('cancel-btn').style.display = "inline-flex";
        document.getElementById('title').focus();
    }

    function resetFormState() {
        document.getElementById('track-form').reset();
        document.getElementById('edit-index').value = "-1";
        document.getElementById('submit-btn').textContent = "➕ Add Track";
        document.getElementById('cancel-btn').style.display = "none";
    }

    function deleteSong(index) {
        if(!confirm("Are you sure you want to remove this track entry?")) return;
        const songs = getLibrary();
        songs.splice(index, 1);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(songs));
        resetFormState();
        renderAdminList();
    }

    function copyCodeBlock() {
        const box = document.getElementById('sync-string');
        box.select();
        document.execCommand('copy');
        alert("Formatted database block copied to your clipboard! Paste this directly into your index.html file on GitHub.");
    }

    renderAdminList();
</script>
</body>
</html>
