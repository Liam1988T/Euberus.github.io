<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Euberus Admin Panel</title>
    <style>
        body { background: #0f172a; color: white; padding: 40px; font-family: 'Inter', sans-serif; }
        .container { max-width: 700px; margin: auto; background: #1e293b; padding: 30px; border-radius: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .song-row { background: rgba(255,255,255,0.05); padding: 15px; margin-top: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="container">
    <h2 id="form-title">Add New Song</h2>
    <input type="hidden" id="edit-key">
    <input id="title" placeholder="Song Title">
    <input id="artist" placeholder="Artist Name">
    <input id="id" placeholder="YouTube Video ID">
    <button id="save-btn" onclick="saveSong()" style="background: #38bdf8; color: #0f172a;">Save Song</button>
    <button onclick="resetForm()" style="background: #64748b; color: white;">Cancel Edit</button>
    
    <hr style="border: 0; border-top: 1px solid #334155; margin: 30px 0;">
    
    <h3>Current Library</h3>
    <div id="library-list"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDDxrxQrl5RxCx902t3tfbxoenxVQ-di9I", authDomain: "euberus-sg.firebaseapp.com", databaseURL: "https://euberus-sg-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "euberus-sg", storageBucket: "euberus-sg.firebasestorage.app", messagingSenderId: "320119039235", appId: "1:320119039235:web:875717ac32d9a282507536" };
    firebase.initializeApp(firebaseConfig);

    // Load List
    firebase.database().ref('songs').on('value', snapshot => {
        const list = document.getElementById('library-list');
        list.innerHTML = '';
        const data = snapshot.val();
        if(data) {
            Object.keys(data).forEach(key => {
                const s = data[key];
                const div = document.createElement('div');
                div.className = 'song-row';
                div.innerHTML = `
                    <div><strong>${s.title}</strong><br><small>${s.artist}</small></div>
                    <div>
                        <button onclick="editSong('${key}', '${s.title}', '${s.artist}', '${s.driveFileId}')" style="background:#f59e0b;">Edit</button>
                        <button onclick="deleteSong('${key}')" style="background:#ef4444; color:white;">Delete</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }
    });

    function saveSong() {
        const key = document.getElementById('edit-key').value;
        const songData = {
            title: document.getElementById('title').value,
            artist: document.getElementById('artist').value,
            driveFileId: document.getElementById('id').value
        };

        if(key) {
            firebase.database().ref('songs/' + key).update(songData);
            alert("Updated!");
        } else {
            firebase.database().ref('songs').push(songData);
            alert("Added!");
        }
        resetForm();
    }

    function editSong(key, title, artist, id) {
        document.getElementById('edit-key').value = key;
        document.getElementById('title').value = title;
        document.getElementById('artist').value = artist;
        document.getElementById('id').value = id;
        document.getElementById('form-title').innerText = "Edit Song";
        document.getElementById('save-btn').innerText = "Update Song";
    }

    function resetForm() {
        document.getElementById('edit-key').value = '';
        document.getElementById('title').value = '';
        document.getElementById('artist').value = '';
        document.getElementById('id').value = '';
        document.getElementById('form-title').innerText = "Add New Song";
        document.getElementById('save-btn').innerText = "Save Song";
    }

    function deleteSong(key) {
        if(confirm("Delete this track?")) firebase.database().ref('songs/' + key).remove();
    }
</script>
</body>
</html>
