<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euberus Stream - Admin Panel</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-color: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --danger-color: #ef4444;
            --success-color: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 40px 20px; display: flex; justify-content: center; }
        .admin-container { width: 100%; max-width: 700px; background-color: var(--panel-color); border-radius: 12px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        h1 { font-size: 22px; margin-bottom: 20px; color: var(--accent-color); border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        h2 { font-size: 16px; margin: 25px 0 10px 0; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 14px; color: var(--text-muted); }
        input, textarea { background-color: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-main); padding: 10px; border-radius: 6px; font-size: 14px; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent-color); }
        
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        button { cursor: pointer; padding: 10px 20px; border: none; border-radius: 6px; font-weight: 600; font-size: 14px; transition: background 0.2s; }
        .btn-primary { background-color: var(--accent-color); color: #0f172a; }
        .btn-primary:hover { background-color: #7dd3fc; }
        .btn-secondary { background-color: #334155; color: var(--text-main); }
        .btn-secondary:hover { background-color: #475569; }
        .btn-danger { background-color: var(--danger-color); color: white; }
        
        .sync-box { background-color: rgba(255,255,255,0.02); border: 1px dashed var(--border-color); padding: 15px; border-radius: 8px; margin-top: 15px; }
        
        .track-list { list-style: none; margin-top: 15px; }
        .track-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 6px; margin-bottom: 8px; font-size: 14px; border: 1px solid rgba(255,255,255,0.02); }
        .track-meta { color: var(--text-muted); font-size: 12px; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>Euberus Control Dashboard</h1>
    
    <!-- ADD TRACK FORM -->
    <form id="track-form" onsubmit="addSong(event)">
        <div class="form-group">
            <label>Song Title</label>
            <input type="text" id="title" required placeholder="e.g., Because You're My Woman">
        </div>
        <div class="form-group">
            <label>Artist Name</label>
            <input type="text" id="artist" required placeholder="e.g., Lee Seung Gi">
        </div>
        <div class="form-group">
            <label>YouTube Video ID</label>
            <input type="text" id="driveFileId" required placeholder="e.g., e8zl1u2plOQ">
        </div>
        <button type="submit" class="btn-primary">➕ Add Track to Sandbox</button>
    </form>

    <!-- CROSS-DOMAIN DATA SYNC UTILITY -->
    <h2>🔗 Domain Data Sync Tools</h2>
    <div class="sync-box">
        <div class="form-group">
            <label>Sync Package String</label>
            <textarea id="sync-string" rows="3" placeholder="Paste data package string here to import, or click Export..."></textarea>
        </div>
        <div class="btn-row">
            <button type="button" class="btn-secondary" onclick="exportData()">📤 Export Package</button>
            <button type="button" class="btn-primary" onclick="importData()" style="background-color: var(--success-color); color: white;">📥 Import Package</button>
        </div>
    </div>

    <!-- TRACK MANAGEMENT SUMMARY -->
    <h2>📦 Current Track Inventory</h2>
    <ul class="track-list" id="admin-playlist"></ul>
</div>
    
    <div style="margin-top: 30px; padding: 20px; background: rgba(255, 255, 255, 0.03); border: 1px dashed #334155; border-radius: 8px;">
    <h3 style="font-size: 14px; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px;">🔗 Cross-Domain Sync Tools</h3>
    <div style="display: flex; flex-direction: column; gap: 10px;">
        <textarea id="sync-string" rows="2" style="background: #0f172a; border: 1px solid #334155; color: #f8fafc; padding: 10px; border-radius: 6px; font-size: 13px; width: 100%; resize: vertical;" placeholder="Paste sync package string here to import, or click Export..."></textarea>
        <div style="display: flex; gap: 10px;">
            <button type="button" onclick="exportData()" style="cursor: pointer; background: #334155; color: #f8fafc; padding: 8px 16px; border: none; border-radius: 6px; font-weight: 600; font-size: 13px;">📤 Export Package</button>
            <button type="button" onclick="importData()" style="cursor: pointer; background: #10b981; color: white; padding: 8px 16px; border: none; border-radius: 6px; font-weight: 600; font-size: 13px;">📥 Import Package</button>
        </div>
    </div>
</div>

<script>
    const defaultMockData = [
        { id: "track_1", title: "Because You're My Woman", artist: "Lee Seung Gi", driveFileId: "e8zl1u2plOQ" }
    ];

    function getLibrary() {
        const data = localStorage.getItem('euberus_song_library');
        if (!data) {
            localStorage.setItem('euberus_song_library', JSON.stringify(defaultMockData));
            return defaultMockData;
        }
        return JSON.parse(data);
    }

    function renderAdminList() {
        const songs = getLibrary();
        const container = document.getElementById('admin-playlist');
        container.innerHTML = '';
        
        songs.forEach((song, index) => {
            const li = document.createElement('li');
            li.className = 'track-item';
            li.innerHTML = `
                <div>
                    <strong>${song.title}</strong> - ${song.artist}
                    <div class="track-meta">ID: ${song.driveFileId}</div>
                </div>
                <button class="btn-danger" style="padding: 5px 10px; font-size: 12px;" onclick="deleteSong(${index})">Delete</button>
            `;
            container.appendChild(li);
        });
    }

    function addSong(e) {
        e.preventDefault();
        const songs = getLibrary();
        
        const newSong = {
            id: "track_" + Date.now(),
            title: document.getElementById('title').value,
            artist: document.getElementById('artist').value,
            driveFileId: document.getElementById('driveFileId').value
        };
        
        songs.push(newSong);
        localStorage.setItem('euberus_song_library', JSON.stringify(songs));
        document.getElementById('track-form').reset();
        renderAdminList();
    }

    function deleteSong(index) {
        const songs = getLibrary();
        songs.splice(index, 1);
        localStorage.setItem('euberus_song_library', JSON.stringify(songs));
        renderAdminList();
    }

    // --- SYNC EXPORT LOGIC ---
    function exportData() {
        const songs = getLibrary();
        // Convert to base64 payload to prevent browser paste truncation errors
        const cleanString = btoa(unescape(encodeURIComponent(JSON.stringify(songs))));
        document.getElementById('sync-string').value = cleanString;
        
        document.getElementById('sync-string').select();
        document.execCommand('copy');
        alert("Data package string exported and copied to clipboard automatically!");
    }

    // --- SYNC IMPORT LOGIC ---
    function importData() {
        const inputString = document.getElementById('sync-string').value.trim();
        if (!inputString) {
            alert("Please paste a valid sync package string first.");
            return;
        }
        
        try {
            const parsedJSON = JSON.parse(decodeURIComponent(escape(atob(inputString))));
            if (Array.isArray(parsedJSON)) {
                localStorage.setItem('euberus_song_library', JSON.stringify(parsedJSON));
                alert("Library package imported successfully! Your track list is now matched.");
                renderAdminList();
                document.getElementById('sync-string').value = '';
            } else {
                alert("Invalid data payload formatting.");
            }
        } catch (err) {
            alert("Failed to parse data string. Make sure you copied the whole code block cleanly.");
        }
    }

    renderAdminList();
</script>
</body>
</html>
