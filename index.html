<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euberus Premium Stream</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #f8fafc; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .dashboard { width: 100%; max-width: 850px; background: var(--panel); border-radius: 24px; padding: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); }
        
        .track-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
        .track-item { padding: 16px 20px; background: var(--glass); border-radius: 16px; cursor: pointer; display: flex; align-items: center; transition: 0.3s; }
        .track-item:hover { background: rgba(56, 189, 248, 0.1); border: 1px solid var(--accent); }
        
        .player-panel { text-align: center; padding: 32px; background: rgba(0,0,0,0.2); border-radius: 20px; }
        .btn-icon { background: none; border: none; cursor: pointer; color: var(--accent); padding: 10px; border-radius: 50%; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn-icon:hover { background: rgba(56, 189, 248, 0.2); transform: scale(1.1); }
        
        /* Premium Repeat Toggle States */
        #repeat-btn { color: #64748b; }
        #repeat-btn.active { color: var(--accent); filter: drop-shadow(0 0 8px var(--accent)); }
        
        #master-play { background: var(--accent); color: #0f172a; padding: 15px 40px; border-radius: 50px; font-weight: 800; border: none; cursor: pointer; margin-bottom: 20px; }
        #yt-engine { position: absolute; left: -9999px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

<div class="dashboard">
    <h2 style="margin-bottom: 24px; letter-spacing: -0.5px;">Euberus Cloud Library</h2>
    <div style="display: grid; grid-template-columns: 1fr 300px; gap: 32px;">
        <ul class="track-list" id="playlist"></ul>
        <div class="player-panel">
            <div id="current-title" style="margin-bottom: 20px; font-weight: 600; opacity: 0.8;">Select a track</div>
            <button id="master-play" onclick="togglePlayback()">PLAY</button>
            <div style="display: flex; justify-content: center; gap: 30px;">
                <button class="btn-icon" id="repeat-btn" onclick="toggleRepeat()" title="Toggle Repeat">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2v4a2 2 0 0 1-2 2H3M7 22v-4a2 2 0 0 1 2-2h12"/></svg>
                </button>
                <button class="btn-icon" onclick="nextSong()">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="yt-engine"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAYnsN9UWtkBxLYTgbe21tpIczGhrni7T8",
        authDomain: "euberus-ed3b4.firebaseapp.com",
        databaseURL: "https://euberus-ed3b4-default-rtdb.firebaseio.com",
        projectId: "euberus-ed3b4",
        storageBucket: "euberus-ed3b4.firebasestorage.app",
        messagingSenderId: "206163602431",
        appId: "1:206163602431:web:70247c1e16d7faae8d95ca"
    };

    firebase.initializeApp(firebaseConfig);
    let player, songs = [], currentIdx = 0, repeat = false;

    firebase.database().ref('songs').once('value', snapshot => {
        const data = snapshot.val();
        if(data) {
            songs = Object.values(data);
            const list = document.getElementById('playlist');
            songs.forEach((s, i) => {
                const li = document.createElement('li');
                li.className = 'track-item';
                li.innerHTML = `<div><strong>${s.title}</strong><br><small style="color:var(--accent)">${s.artist}</small></div>`;
                li.onclick = () => playTrack(i);
                list.appendChild(li);
            });
        }
    });

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-engine', { height: '1', width: '1', events: { 'onStateChange': e => { if(e.data === 0) nextSong(); } } });
    }

    function playTrack(idx) {
        currentIdx = idx;
        player.loadVideoById(songs[idx].driveFileId);
        player.playVideo();
        document.getElementById('current-title').textContent = songs[idx].title;
        document.getElementById('master-play').textContent = 'PAUSE';
    }

    function togglePlayback() {
        if (player.getPlayerState() === 1) { player.pauseVideo(); document.getElementById('master-play').textContent = 'PLAY'; }
        else { player.playVideo(); document.getElementById('master-play').textContent = 'PAUSE'; }
    }

    function nextSong() {
        currentIdx = repeat ? currentIdx : (currentIdx + 1) % songs.length;
        playTrack(currentIdx);
    }

    function toggleRepeat() {
        repeat = !repeat;
        document.getElementById('repeat-btn').classList.toggle('active', repeat);
    }
</script>
</body>
</html>
