<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euberus | Premium Audio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030712; --card: rgba(30, 41, 59, 0.5); --accent: #38bdf8; --text: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at top right, #0f172a, #030712); padding: 20px; }
        
        .main-container { width: 100%; max-width: 900px; display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        @media (max-width: 768px) { .main-container { grid-template-columns: 1fr; } }
        
        /* Glassmorphism Panel */
        .glass-panel { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 40px; }
        
        .hero-player { text-align: center; }
        #status-indicator { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 20px; }
        #current-title { font-size: 24px; font-weight: 600; margin-bottom: 30px; }
        
        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .btn-main { width: 80px; height: 80px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; font-size: 30px; transition: 0.4s; }
        .btn-main:hover { transform: scale(1.1); box-shadow: 0 0 30px var(--accent); }
        .btn-sub { background: rgba(255,255,255,0.05); color: #fff; width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; transition: 0.3s; }
        
        .track-list { list-style: none; overflow-y: auto; max-height: 400px; }
        .track-item { padding: 20px; margin-bottom: 15px; background: rgba(255,255,255,0.02); border-radius: 20px; cursor: pointer; transition: 0.4s; border: 1px solid transparent; }
        .track-item:hover { background: rgba(56, 189, 248, 0.1); border: 1px solid var(--accent); transform: scale(1.02); }
        
        #yt-engine { position: absolute; left: -9999px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="glass-panel hero-player">
        <div id="status-indicator">Ready to Stream</div>
        <div id="current-title">Select a track</div>
        <div class="controls">
            <button class="btn-sub" onclick="prevSong()">⏮</button>
            <button class="btn-main" id="master-play" onclick="togglePlayback()">▶</button>
            <button class="btn-sub" onclick="nextSong()">⏭</button>
        </div>
    </div>
    
    <div class="glass-panel">
        <h3 style="margin-bottom: 20px; font-weight: 300;">Your Library</h3>
        <ul class="track-list" id="playlist"></ul>
    </div>
</div>

<div style="position: fixed; bottom: 20px; color: #334155; font-size: 10px;">Euberus v1.0.0</div>

<div id="yt-engine"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyDDxrxQrl5RxCx902t3tfbxoenxVQ-di9I", authDomain: "euberus-sg.firebaseapp.com", databaseURL: "https://euberus-sg-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "euberus-sg", storageBucket: "euberus-sg.firebasestorage.app", messagingSenderId: "320119039235", appId: "1:320119039235:web:875717ac32d9a282507536" };
    firebase.initializeApp(firebaseConfig);
    
    let player, songs = [], currentIdx = 0;

    firebase.database().ref('songs').on('value', snap => {
        const data = snap.val();
        const list = document.getElementById('playlist');
        list.innerHTML = '';
        if(data) {
            songs = Object.values(data);
            songs.forEach((s, i) => {
                const li = document.createElement('li');
                li.className = 'track-item';
                li.innerHTML = `<strong>${s.title}</strong><br><small style="color:var(--accent)">${s.artist}</small>`;
                li.onclick = () => playTrack(i);
                list.appendChild(li);
            });
        }
    });

    function onYouTubeIframeAPIReady() { player = new YT.Player('yt-engine', { height: '0', width: '0', events: { 'onStateChange': e => { if(e.data === 0) nextSong(); } } }); }
    function playTrack(i) { currentIdx = i; player.loadVideoById(songs[i].driveFileId); player.playVideo(); document.getElementById('current-title').textContent = songs[i].title; document.getElementById('master-play').textContent = '⏸'; }
    function togglePlayback() { if(player.getPlayerState() === 1) { player.pauseVideo(); document.getElementById('master-play').textContent = '▶'; } else { player.playVideo(); document.getElementById('master-play').textContent = '⏸'; } }
    function nextSong() { currentIdx = (currentIdx + 1) % songs.length; playTrack(currentIdx); }
    function prevSong() { currentIdx = (currentIdx - 1 + songs.length) % songs.length; playTrack(currentIdx); }
</script>
</body>
</html>
