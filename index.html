<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euberus Cloud</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .track-item { width: 100%; max-width: 500px; padding: 15px; margin: 10px 0; background: #1e293b; border-radius: 8px; cursor: pointer; }
        #start-btn { padding: 20px 40px; font-size: 20px; background: #38bdf8; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 20px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

    <button id="start-btn" onclick="initPlayer()">TAP TO START PLAYER</button>
    <ul id="playlist" style="width:100%; max-width:500px; list-style:none;"></ul>
    <div id="yt-player"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAYnsN9UWtkBxLYTgbe21tpIczGhrni7T8",
            authDomain: "euberus-ed3b4.firebaseapp.com",
            databaseURL: "https://euberus-ed3b4-default-rtdb.firebaseio.com",
            projectId: "euberus-ed3b4",
            storageBucket: "euberus-ed3b4.firebasestorage.app",
            messagingSenderId: "206163602431",
            appId: "1:206163602431:web:70247c1e16d7faae8d95ca"
        };
        firebase.initializeApp(firebaseConfig);
        
        let player;
        let songs = [];

        // Fetch data immediately
        firebase.database().ref('songs').once('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                songs = Object.values(data);
                const list = document.getElementById('playlist');
                list.innerHTML = songs.map((s, i) => `
                    <li class="track-item" onclick="playSong('${s.driveFileId}')">
                        <strong>${s.title}</strong><br><small>${s.artist}</small>
                    </li>
                `).join('');
            }
        });

        function initPlayer() {
            document.getElementById('start-btn').style.display = 'none';
            player = new YT.Player('yt-player', { height: '200', width: '100%', videoId: 'e8zl1u2plOQ' });
        }

        function playSong(id) {
            if(player) {
                player.loadVideoById(id);
            } else {
                alert("Please tap the 'TAP TO START PLAYER' button first!");
            }
        }
    </script>
</body>
</html>
