<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euberus Cloud Player</title>
    <style>
        :root { --bg-color: #0f172a; --panel-color: #1e293b; --accent-color: #38bdf8; --text-main: #f8fafc; --text-muted: #94a3b8; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0c1220; color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .dashboard { width: 100%; max-width: 800px; background-color: var(--panel-color); border-radius: 16px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .header { padding: 20px; background: #0284c7; display: flex; justify-content: space-between; align-items: center; }
        .content { display: grid; grid-template-columns: 1fr 1fr; padding: 20px; gap: 20px; }
        .track-list { list-style: none; }
        .track-item { background: rgba(0,0,0,0.2); padding: 12px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .track-item:hover { background: #334155; }
        .player-panel { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .controls { display: flex; gap: 25px; margin-top: 25px; align-items: center; }
        .btn-main { background: var(--accent-color); color: #0f172a; padding: 12px 40px; border-radius: 50px; font-weight: 800; border: none; cursor: pointer; }
        .btn-ctrl { background: none; border: none; cursor: pointer; color: #64748b; padding: 8px; }
        .btn-ctrl.active { color: var(--accent-color); }
        #yt-engine { position: absolute; left: -9999px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

<div class="dashboard">
    <div class="header"><h1>Euberus Cloud Player</h1></div>
    <div class="content">
        <div>
            <div style="color:var(--text-muted); font-size: 12px; margin-bottom: 10px;">AVAILABLE TRACKS</div>
            <ul class="track-list" id="playlist"></ul>
        </div>
        <div class="player-panel">
            <div id="current-title" style="font-weight:bold; margin-bottom: 20px;">Select a track</div>
            <button class="btn-main" id="master-play" onclick="togglePlayback()">PLAY</button>
            <div class="controls">
                <button class="btn-ctrl" id="repeat-btn" onclick="toggleRepeat()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2v4a2 2 0 0 1-2 2H3M7 22v-4a2 2 0 0 1 2-2h12"/></svg>
                </button>
                <button class="btn-ctrl" onclick="nextSong()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="yt-engine"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAYnsN9UWtkBxLYTgbe21tpIczGhrni7T8",
        authDomain: "euberus-ed3b4.firebaseapp.com",
        databaseURL: "https://euberus-ed3b4-default-rtdb.firebaseio.com",
        projectId: "euberus-ed3b4",
        storageBucket: "euberus-ed3b4.firebasestorage.app",
        messagingSenderId: "206163602431",
        appId: "1:206163602431:web:70247c1e16d7faae8d95ca"
    };

    firebase.initializeApp(firebaseConfig);
    let player, songs = [], currentIdx = 0, repeat = false;

    firebase.database().ref('songs').once('value', snapshot => {
        const data = snapshot.val();
        if(data) {
            songs = Object.values(data);
            const list = document.getElementById('playlist');
            songs.forEach((s, i) => {
                const li = document.createElement('li');
                li.className = 'track-item';
                li.innerHTML = `<div><strong>${s.title}</strong><br><small style="color:var(--accent-color)">${s.artist}</small></div>`;
                li.onclick = () => playTrack(i);
                list.appendChild(li);
            });
        }
    });

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-engine', { height: '1', width: '1', events: { 'onStateChange': e => { if(e.data === 0) nextSong(); } } });
    }

    function playTrack(idx) {
        currentIdx = idx;
        player.loadVideoById(songs[idx].driveFileId);
        player.playVideo();
        document.getElementById('current-title').textContent = songs[idx].title;
        document.getElementById('master-play').textContent = 'PAUSE';
    }

    function togglePlayback() {
        if (player.getPlayerState() === 1) { player.pauseVideo(); document.getElementById('master-play').textContent = 'PLAY'; }
        else { player.playVideo(); document.getElementById('master-play').textContent = 'PAUSE'; }
    }

    function nextSong() {
        currentIdx = repeat ? currentIdx : (currentIdx + 1) % songs.length;
        playTrack(currentIdx);
    }

    function toggleRepeat() {
        repeat = !repeat;
        document.getElementById('repeat-btn').classList.toggle('active', repeat);
    }
</script>
</body>
</html>
