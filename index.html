<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euberus Premium Stream</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .dashboard { width: 100%; max-width: 850px; background: var(--panel); border-radius: 24px; padding: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        
        .navbar { display: flex; gap: 30px; margin-bottom: 24px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-item { cursor: pointer; color: #64748b; font-weight: 600; padding: 5px 0; transition: 0.3s; font-size: 14px; }
        .nav-item.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .grid-container { display: grid; grid-template-columns: 1fr 320px; gap: 32px; }
        @media (max-width: 768px) { .grid-container { grid-template-columns: 1fr; } .player-panel { order: -1; } }
        
        #search-bar { width: 100%; padding: 14px 18px; margin-bottom: 16px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2); color: var(--text); font-size: 14px; outline: none; transition: border 0.3s; }
        #search-bar:focus { border-color: var(--accent); }

        .track-list { list-style: none; display: flex; flex-direction: column; gap: 12px; max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .track-list::-webkit-scrollbar { width: 6px; }
        .track-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .track-item { padding: 16px 20px; background: rgba(255,255,255,0.03); border-radius: 16px; cursor: pointer; transition: all 0.3s; border: 1px solid transparent; display: flex; justify-content: space-between; align-items: center; }
        .track-item:hover { background: rgba(56, 189, 248, 0.05); border: 1px solid var(--accent); }
        .active-track { background: rgba(56, 189, 248, 0.1); border-color: var(--accent); }
        
        .track-title { font-size: 15px; font-weight: 600; color: #f1f5f9; display: block; }
        .track-artist { font-size: 12px; color: #94a3b8; margin-top: 4px; display: block; }

        .playing-anim { display: flex; align-items: flex-end; gap: 3px; height: 16px; }
        .bar { width: 4px; background: var(--accent); border-radius: 2px; animation: bounce 1s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { height: 4px; } 50% { height: 16px; } }

        .player-panel { text-align: center; padding: 32px; background: rgba(0,0,0,0.2); border-radius: 20px; backdrop-filter: blur(10px); }
        #status-indicator { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 10px; }
        .buffering { color: var(--accent) !important; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .controls-row { display: flex; justify-content: center; align-items: center; gap: 24px; margin-top: 30px; }
        .btn-ctrl { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; color: #94a3b8; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .btn-main { background: var(--accent); color: #0f172a; width: 70px; height: 70px; border-radius: 50%; font-size: 28px; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); }
        .btn-ctrl:hover { transform: scale(1.1); color: var(--accent); border-color: var(--accent); }
        
        #progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 30px; cursor: pointer; position: relative; }
        #progress-bar { height: 100%; background: var(--accent); width: 0%; border-radius: 4px; transition: width 0.2s linear; }
        #time-display { display: flex; justify-content: space-between; font-size: 11px; color: #94a3b8; margin-top: 8px; }

        #video-player { width: 100%; display: none; border-radius: 12px; margin-bottom: 20px; }
        #yt-engine { position: absolute; left: -9999px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

<div class="dashboard">
    <h2 style="margin-bottom: 24px;">Euberus Premium Stream</h2>
    <div class="navbar">
        <div class="nav-item active" id="nav-music" onclick="switchTab('songs', 'nav-music')">Music</div>
        <div class="nav-item" id="nav-movies" onclick="switchTab('movies', 'nav-movies')">Movies & TV Series</div>
    </div>
    
    <div class="grid-container">
        <div class="player-panel">
            <video id="video-player" controls></video>
            <div id="status-indicator">Ready</div>
            <div id="current-title" style="margin-bottom: 25px; font-weight: 600; color: var(--accent);">Select content</div>
            <div class="controls-row">
                <button class="btn-ctrl" onclick="prevSong()">⏮</button>
                <button class="btn-main" id="master-play" onclick="togglePlayback()">▶</button>
                <button class="btn-ctrl" onclick="nextSong()">⏭</button>
                <button class="btn-ctrl" id="repeat-btn" onclick="toggleRepeat()">R</button>
            </div>
            <div id="progress-container" onclick="seekTrack(event)"><div id="progress-bar"></div></div>
            <div id="time-display"><span id="time-current">0:00</span><span id="time-total">0:00</span></div>
        </div>
        
        <div>
            <input type="text" id="search-bar" placeholder="Search..." onkeyup="filterTracks()">
            <ul class="track-list" id="playlist"></ul>
        </div>
    </div>
</div>

<div style="margin-top: 20px; color: #475569; font-size: 12px;">Euberus Cloud Player v1.1.0</div>
<div id="yt-engine"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDDxrxQrl5RxCx902t3tfbxoenxVQ-di9I", authDomain: "euberus-sg.firebaseapp.com", databaseURL: "https://euberus-sg-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "euberus-sg", storageBucket: "euberus-sg.firebasestorage.app", messagingSenderId: "320119039235", appId: "1:320119039235:web:875717ac32d9a282507536" };
    firebase.initializeApp(firebaseConfig);
    
    let player, items = [], currentIdx = 0, repeat = false, progressInterval, currentPath = 'songs';
    const videoEl = document.getElementById('video-player');

    function switchTab(path, navId) {
        if (player && typeof player.pauseVideo === 'function') player.pauseVideo();
        videoEl.pause();
        currentPath = path;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById(navId).classList.add('active');
        videoEl.style.display = (path === 'movies') ? 'block' : 'none';
        loadData();
    }

    function loadData() {
        firebase.database().ref(currentPath).on('value', snapshot => {
            items = snapshot.val() ? Object.values(snapshot.val()) : [];
            const list = document.getElementById('playlist');
            list.innerHTML = '';
            items.forEach((s, i) => {
                const li = document.createElement('li');
                li.className = 'track-item';
                li.id = 'track-item-' + i;
                li.innerHTML = `<div><span class="track-title">${s.title}</span><span class="track-artist">${s.artist || ''}</span></div><div class="anim-container"></div>`;
                li.onclick = () => playItem(i);
                list.appendChild(li);
            });
        });
    }

    function onYouTubeIframeAPIReady() { player = new YT.Player('yt-engine', { height: '1', width: '1' }); }

    function playItem(idx) {
        currentIdx = idx;
        const item = items[idx];
        document.getElementById('current-title').textContent = item.title;
        if (currentPath === 'movies') {
            player.pauseVideo();
            videoEl.src = `https://drive.google.com/uc?id=${item.driveFileId}&export=download`;
            videoEl.play();
        } else {
            videoEl.pause();
            player.loadVideoById(item.driveFileId);
        }
    }

    function togglePlayback() {
        if (currentPath === 'movies') {
            videoEl.paused ? videoEl.play() : videoEl.pause();
            document.getElementById('master-play').textContent = videoEl.paused ? '⏸' : '▶';
        } else {
            player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo();
            document.getElementById('master-play').textContent = player.getPlayerState() === 1 ? '▶' : '⏸';
        }
    }

    function nextSong() { currentIdx = repeat ? currentIdx : (currentIdx + 1) % items.length; playItem(currentIdx); }
    function prevSong() { currentIdx = (currentIdx - 1 + items.length) % items.length; playItem(currentIdx); }
    function toggleRepeat() { repeat = !repeat; document.getElementById('repeat-btn').classList.toggle('active', repeat); }
    function filterTracks() { const q = document.getElementById('search-bar').value.toLowerCase(); document.querySelectorAll('.track-item').forEach(el => el.style.display = el.innerText.toLowerCase().includes(q) ? 'flex' : 'none'); }
    function seekTrack(e) { /* existing logic */ }
    loadData();
</script>
</body>
</html>
