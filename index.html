<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euberus Stream - Music Player</title>
    <style>
        :root { --bg-color: #0f172a; --panel-color: #1e293b; --accent-color: #38bdf8; --text-main: #f8fafc; --text-muted: #94a3b8; --track-hover: #334155; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .dashboard { width: 100%; max-width: 900px; background-color: var(--panel-color); border-radius: 16px; padding: 20px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); }
        .header { padding-bottom: 20px; border-bottom: 1px solid var(--track-hover); margin-bottom: 20px; }
        .track-list { list-style: none; }
        .track-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-radius: 8px; cursor: pointer; transition: background 0.2s; margin-bottom: 8px; background-color: rgba(255, 255, 255, 0.02); }
        .track-item:hover { background-color: var(--track-hover); }
        .track-info { display: flex; flex-direction: column; }
        .track-title { font-weight: 500; font-size: 16px; }
        .track-artist { font-size: 13px; color: var(--text-muted); }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="dashboard">
    <div class="header"><h1>Euberus Cloud Player</h1></div>
    <ul class="track-list" id="playlist"></ul>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAYnsN9UWtkBxLYTgbe21tpIczGhrni7T8",
        authDomain: "euberus-ed3b4.firebaseapp.com",
        databaseURL: "https://euberus-ed3b4-default-rtdb.firebaseio.com",
        projectId: "euberus-ed3b4",
        storageBucket: "euberus-ed3b4.firebasestorage.app",
        messagingSenderId: "206163602431",
        appId: "1:206163602431:web:70247c1e16d7faae8d95ca"
    };

    firebase.initializeApp(firebaseConfig);
    
    // Fetch and display songs
    firebase.database().ref('songs').once('value', (snapshot) => {
        const data = snapshot.val();
        const list = document.getElementById('playlist');
        if(data) {
            Object.values(data).forEach(song => {
                const li = document.createElement('li');
                li.className = 'track-item';
                li.innerHTML = `
                    <div class="track-info">
                        <div class="track-title">${song.title}</div>
                        <div class="track-artist">${song.artist}</div>
                    </div>
                `;
                list.appendChild(li);
            });
        }
    });
</script>
</body>
</html>
